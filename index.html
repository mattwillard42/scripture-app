  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --navy:       #0d1b2a;
      --navy-mid:   #112236;
      --navy-light: #1a3150;
      --border:     #1e3d5c;
      --sepia:      #d4b896;
      --sepia-dim:  #a8916f;
      --sepia-faint:#7a6a52;
      --gold:       #c9a84c;
      --gold-dim:   #9e7f38;
      --white-soft: #e8ddd0;
    }

    html, body {
      height: 100%;
      background: var(--navy);
      color: var(--sepia);
      font-family: 'EB Garamond', Georgia, serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0);
    }

    /* ── Phone shell ─────────────────────────────── */
    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--navy);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* subtle texture overlay */
    .app::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(13,27,42,0.8) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ──────────────────────────────────── */
    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 36px 24px 20px;
      border-bottom: 1px solid var(--border);
    }

    .app-title {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.85;
    }

    .date-label {
      margin-top: 6px;
      font-size: 13px;
      font-style: italic;
      color: var(--sepia-faint);
      letter-spacing: 0.04em;
    }

    /* ── Ornament ────────────────────────────────── */
    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 18px 0 0;
    }

    .ornament-line {
      flex: 1;
      max-width: 80px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim));
    }

    .ornament-line.right {
      background: linear-gradient(to left, transparent, var(--gold-dim));
    }

    .ornament-diamond {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      opacity: 0.7;
    }

    /* ── Main scripture card ─────────────────────── */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 28px 24px 20px;
    }

    .card {
      width: 100%;
      background: var(--navy-mid);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 28px 32px;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(201,168,76,0.06),
        0 8px 40px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(201,168,76,0.08);
    }

    /* corner accents */
    .card::before,
    .card::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--gold-dim);
      border-style: solid;
      opacity: 0.5;
    }

    .card::before {
      top: 10px;
      left: 10px;
      border-width: 1px 0 0 1px;
      border-radius: 4px 0 0 0;
    }

    .card::after {
      bottom: 10px;
      right: 10px;
      border-width: 0 1px 1px 0;
      border-radius: 0 0 4px 0;
    }

    .theme-tag {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.6;
      text-align: center;
      margin-bottom: 20px;
    }

    .scripture-text {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: clamp(18px, 4.8vw, 21px);
      line-height: 1.85;
      color: var(--sepia);
      text-align: center;
      font-style: normal;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .quote-mark {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 72px;
      line-height: 0;
      color: var(--gold);
      opacity: 0.18;
      position: absolute;
      top: 46px;
      left: 18px;
      font-style: normal;
      pointer-events: none;
    }

    .reference {
      margin-top: 24px;
      text-align: center;
    }

    .reference-text {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--gold);
      opacity: 0.8;
      text-transform: uppercase;
    }

    .reference-full {
      margin-top: 4px;
      font-size: 13px;
      color: var(--sepia-faint);
      font-style: italic;
      letter-spacing: 0.04em;
    }

    /* ── Navigation ──────────────────────────────── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 28px;
    }

    .nav-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--sepia-dim);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-btn:active {
      background: var(--navy-light);
      border-color: var(--gold-dim);
      color: var(--gold);
    }

    .nav-counter {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--sepia-faint);
      min-width: 60px;
      text-align: center;
    }


    /* ── Footer ──────────────────────────────────── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 16px 24px 28px;
      border-top: 1px solid var(--border);
    }

    .footer-text {
      font-size: 11px;
      color: var(--sepia-faint);
      opacity: 0.5;
      letter-spacing: 0.06em;
      font-style: italic;
    }

    /* ── Card flip transition ────────────────────── */
    .card-scene {
      width: 100%;
      perspective: 1000px;
    }

    .card {
      transform-origin: center center;
      transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
      backface-visibility: hidden;
    }

    .card.flip-out-left  { transform: rotateY(-90deg) scale(0.95); }
    .card.flip-out-right { transform: rotateY(90deg)  scale(0.95); }
    .card.flip-in-left   { transform: rotateY(90deg)  scale(0.95); transition: none; }
    .card.flip-in-right  { transform: rotateY(-90deg) scale(0.95); transition: none; }
  </style>
</head>

// ── Helpers ───────────────────────────────────────────────────────────────────
function getDailyIndex() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const diff = now - start;
  const oneDay = 1000 * 60 * 60 * 24;
  const dayOfYear = Math.floor(diff / oneDay);
  return dayOfYear % scriptures.length;
}

function formatDate(date) {
  return date.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
}

function formatRef(s) {
  return `${s.book} ${s.chapter}:${s.verse}`;
}

// ── State & Render ────────────────────────────────────────────────────────────
const todayIndex = getDailyIndex();
let currentIndex = todayIndex;

const card          = document.getElementById('card');
const themeTag      = document.getElementById('themeTag');
const scriptureText = document.getElementById('scriptureText');
const referenceShort= document.getElementById('referenceShort');
const navCounter    = document.getElementById('navCounter');
const dateLabel     = document.getElementById('dateLabel');

dateLabel.textContent = formatDate(new Date());

function updateContent(index) {
  const s = scriptures[index];
  themeTag.textContent       = s.theme;
  scriptureText.textContent  = s.text;
  referenceShort.textContent = formatRef(s);
  navCounter.textContent     = `${index + 1} / ${scriptures.length}`;
}

function render(index) {
  updateContent(index);
}

render(currentIndex);

let flipping = false;

function flipTo(direction) {
  if (flipping) return;
  flipping = true;

  const outClass = direction === 'next' ? 'flip-out-left' : 'flip-out-right';
  const inClass  = direction === 'next' ? 'flip-in-left'  : 'flip-in-right';

  // 1. Rotate card out (edge-on)
  card.classList.add(outClass);

  setTimeout(() => {
    // 2. Snap to opposite edge with no transition, update content
    card.classList.remove(outClass);
    card.classList.add(inClass);

    if (direction === 'next') {
      currentIndex = (currentIndex + 1) % scriptures.length;
    } else {
      currentIndex = (currentIndex - 1 + scriptures.length) % scriptures.length;
    }
    updateContent(currentIndex);

    // 3. Force reflow so the browser registers the no-transition position
    card.getBoundingClientRect();

    // 4. Remove no-transition class and snap back to flat (animate in)
    card.classList.remove(inClass);

    setTimeout(() => { flipping = false; }, 400);
  }, 380);
}

function goNext() { flipTo('next'); }
function goPrev() { flipTo('prev'); }

document.getElementById('prevBtn').addEventListener('click', goPrev);
document.getElementById('nextBtn').addEventListener('click', goNext);

// ── Swipe support ─────────────────────────────────────────────────────────────
let touchStartX = 0;
let touchStartY = 0;

document.getElementById('card').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
}, { passive: true });

document.getElementById('card').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  const dy = e.changedTouches[0].screenY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    dx < 0 ? goNext() : goPrev();
  }
}, { passive: true });
</script>
